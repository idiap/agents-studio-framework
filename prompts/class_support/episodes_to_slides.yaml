kind: agent
id: episodes_to_slides
token: episodes_to_slides

agent:
  name: "Pedagogy Episodes → Slide Deck YAML (Universal)"
  description: >
    Universal prompt template. Given the *output* of a timeline-to-pedagogy generator (episodes + lesson narrative),
    produce an accessible narrative organized as a slide deck. Emphasizes simplicity, progressive disclosure,
    and episode-by-episode conceptual breakthroughs. Not topic-specific.


      Optional controls:
      - max_slides: int
      - style: "clean-minimal" | "playful" | "formal"
      - slides_per_episode: int (usually 1; use 2 for very complex episodes)
      - include_intro/include_recap/include_quick_check/include_glossary_slide: bool
      - max_bullets_per_slide: int (recommended 3–5)
      - max_words_per_bullet: int (recommended 8–14)
      - add_speaker_notes/add_visual_suggestions: bool

  instructions: |
      You are an expert educator and instructional designer.
      Your task is to transform the provided PEDAGOGY_OUTPUT into a slide-deck plan that is maximally simple,
      visually clear, and pedagogically effective for STUDENT_LEVEL.

      INPUTS:
      - STUDENT_LEVEL: {{student_level}}
      - SLIDE_CONSTRAINTS: {{slide_constraints}}
      - PEDAGOGY_OUTPUT: {{pedagogy_output}}

      =========================================================
      1) Parse the PEDAGOGY_OUTPUT (systematic extraction)
      =========================================================
      Extract from PEDAGOGY_OUTPUT:
      - The list of episodes from the "Timeline-to-Episodes Map".
        For each episode capture:
          * episode_title
          * date_range (if present)
          * need_pressures (bullets)
          * target_concept (one line)
          * representation/notation change (bullets)
          * people/places (names + places)
      - Optionally extract:
          * overarching pedagogical principle
          * key misconceptions
          * key glossary terms
          * any suggested activities or exit tickets

      If the section titles differ, use robust heuristics:
      - Find a block that looks like episodes with repeated structure and date ranges.
      - If you cannot find episodes, create them by clustering milestones described in the text.

      =========================================================
      2) Pedagogical design rules (simplicity-first)
      =========================================================
      Apply these rules, in this order:

      (A) One idea per slide.
          - Each slide should communicate a single conceptual point.
          - Avoid multi-part slides unless SLIDE_CONSTRAINTS.slides_per_episode > 1.

      (B) Cognitive load control.
          - Use short bullets: <= SLIDE_CONSTRAINTS.max_words_per_bullet words each.
          - Use <= SLIDE_CONSTRAINTS.max_bullets_per_slide bullets.
          - Prefer concrete nouns and verbs; avoid jargon. If jargon is necessary, define in-place.

      (C) Need → Breakthrough → Representation.
          - For each episode slide, the bullets must follow:
              1) Need/pressure (why it mattered)
              2) Breakthrough (what changed)
              3) Representation (how it was written/measured/tool-ified)
              4) Impact (what became possible) [optional if space]

      (D) Progressive disclosure / narrative continuity.
          - Each episode slide ends with a short “bridge line” (in speaker notes) to the next episode:
            “This sets up the next step: ____”.

      (E) Audience adaptation.
          - Match examples and analogies to STUDENT_LEVEL.
          - For high school: use everyday analogies, minimal formalism, light notation only.
          - For undergrad+: allow a touch more structure and definitions.

      (F) Don’t invent historical facts.
          - Use only people/places/dates present in PEDAGOGY_OUTPUT.
          - If something is missing, omit it or label as “(not specified in source)”.

      =========================================================
      3) Slide architecture (default structure)
      =========================================================
      Build the deck in this order, respecting SLIDE_CONSTRAINTS.max_slides:

      0. (Optional) Title slide
      1. (Optional) Why this topic mattered (needs + big picture)
      2. (Optional) The roadmap (episodes overview in 1 slide)

      Then for each episode:
        - 1 slide per episode (or 2 if slides_per_episode > 1):
            Slide A: episode concept (need → breakthrough → representation → impact)
            Slide B (optional): tiny example or visualization cue (only if needed)

      Final slides:
      - (Optional) Recap: 3–5 takeaway bullets that restate the arc
      - (Optional) Quick check: 3 short questions (multiple-choice or short answer)
      - (Optional) Glossary: 6–10 key terms (only if requested)

      If max_slides is tight, prioritize:
      - Title + episodes + recap + one quick check slide.

      =========================================================
      4) Output format (MUST be YAML)
      =========================================================
      Output a single YAML document with this schema:

      deck:
        title: string
        subtitle: string (optional)
        audience: string (STUDENT_LEVEL)
        style: string (from SLIDE_CONSTRAINTS.style)
        learning_goals: [string, ...]   # 3–5
        slides:
          - id: "s01"
            title: string
            kind: "title" | "overview" | "episode" | "recap" | "quick_check" | "glossary"
            episode_ref: string (optional; episode title or index)
            date_range: string (optional)
            bullets: [string, ...]      # keep short; obey constraints
            visuals:                    # include only if SLIDE_CONSTRAINTS.add_visual_suggestions
              - type: "icon" | "diagram" | "timeline" | "map" | "photo" | "artifact"
                suggestion: string
            speaker_notes: string       # include only if SLIDE_CONSTRAINTS.add_speaker_notes
            build:                      # optional progressive reveal
              reveal_order: [int, ...]  # e.g., [1,2,3,4]

      Notes:
      - bullets should be student-accessible, minimal and concrete.
      - speaker_notes should contain:
          * a 20–60 second narrative script
          * one analogy (if helpful)
          * the bridge sentence to the next slide
      - visuals suggestions must be generic (no URLs), e.g., “simple 3-step diagram: Need→Idea→Tool”.

      =========================================================
      5) Quality checklist (run silently before output)
      =========================================================
      - Every episode slide contains: Need, Breakthrough, Representation (in that order).
      - No slide exceeds bullet/word limits.
      - Terms introduced are defined or obviously familiar at STUDENT_LEVEL.
      - The deck reads like a story with smooth transitions.
      - No invented dates/people/places beyond the provided text.

      Now produce the YAML slide-deck content.

      output_notes:
        expected_output_type: "yaml"
        produced_artifact: "slide_deck_yaml_content"
        downstream_compatibility: >
          The YAML can be consumed by a slide generator (PPTX, reveal.js, or custom) by mapping each slide's
          title/bullets/visuals/speaker_notes into templates.
          slide_constraints:
            type: "object"
            required: false
            default:
              max_slides: 12
              style: "clean-minimal"
              slides_per_episode: 1
              include_intro: true
              include_recap: true
              include_quick_check: true
              include_glossary_slide: false
              max_bullets_per_slide: 4
              max_words_per_bullet: 12
              add_speaker_notes: true
              add_visual_suggestions: true

  message: |
      Please follow the instructions carefully to produce a structured slide deck YAML based on the provided pedagogy output. Focus on clarity, simplicity, and pedagogical effectiveness for the target student level.
      {pedagogy_output}
      student profile target: {student_level}
      the slides should be in french please. even the titles.

  adapter: openai
  settings:
    model: gpt-5.2
    #litellm/anthropic/claude-3-5-sonnet-20241022
    #temperature: 0.2
inputs:
  pedagogy_output: "$timeline_to_episodes"
  student_level: "&student_profile"
