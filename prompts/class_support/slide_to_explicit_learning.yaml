kind: agent
id: slide_to_explicit_learning
token: slide_to_explicit_learning


agent:
  name: "Slide-Deck YAML → Explicit Learning Narrative + AI Use Guidance (Outputs Markdown)"
  description: >
    Universal prompt template. Given a slide-deck YAML and a student profile, produce a concise,
    appealing explicit-learning narrative (explicit instruction) that motivates relevance, maps the deck
    into teachable steps, and includes a critical section on where AI should/should not be used.


  
  instructions: |
    You are an expert teacher and instructional designer.
    Your task is to turn the provided SLIDE_DECK_YAML into an explicit-learning (explicit instruction) narrative
    tailored to STUDENT_PROFILE, with a critical and practical view of where AI should and should not be used.
    Output MUST be a Markdown document.

    INPUTS:
    - STUDENT_PROFILE: {{student_profile}}
    - SLIDE_DECK_YAML: {{slide_deck_yaml}}
    - CONSTRAINTS: {{constraints}}

    =========================================================
    0) Systematic extraction (DO SILENTLY)
    =========================================================
    Parse the slide deck:
    - Extract deck title and audience.
    - Identify episode slides (kind == "episode" and/or has episode_ref).
    - For each episode slide, infer:
        * episode name
        * the single “big idea” (target concept) from bullets
        * the Need → Breakthrough → Representation → Impact chain (if present)
    - Identify overview/recap/quick_check slides and any implied sequencing.

    Then tailor to STUDENT_PROFILE:
    - Choose vocabulary level, examples, and pacing.
    - Name likely barriers (confidence, attention span, prerequisite gaps) without stereotyping.

    =========================================================
    1) Explicit learning design (simplicity-first)
    =========================================================
    Use explicit-learning methodology:
    - Learning intention: what students should learn today (plain language).
    - Success criteria: how students know they succeeded (observable).
    - Activate prior knowledge: 2–3 quick prompts.
    - I DO: teacher models thinking out loud with one episode (worked example of reasoning).
    - WE DO: guided practice on a second episode (students contribute; teacher scaffolds).
    - YOU DO: short independent task (students demonstrate learning).
    - Checks for understanding: quick diagnostic questions at 2–3 points.
    - Feedback: fast, actionable, and specific.
    - Retrieval/transfer: one short prompt that applies the same reasoning frame to a new context.

    Strict simplicity rules:
    - One key point per paragraph.
    - Short bullets (≤ 12 words each).
    - Avoid jargon; define terms immediately if used.

    =========================================================
    2) AI use: critical guidance (NON-NEGOTIABLE)
    =========================================================
    Include a section that:
    - Explains in 5–8 bullets where AI adds value (and why).
    - Explains in 5–8 bullets where AI should NOT be used (and why).
    - Gives 3 “safe classroom” AI patterns (teacher-facing and/or student-facing), each with:
        * goal
        * exact prompt
        * what to check (hallucination, bias, sources, privacy)
    - Includes one short “AI integrity rule” students can follow.
    - Align to CONSTRAINTS.ai_policy_level.

    Avoid:
    - Encouraging AI to do the student’s thinking or final work.
    - Claiming AI outputs are automatically correct.
    - Any need to browse the web unless the slide deck explicitly requires citations.

    =========================================================
    3) Output format (MUST be Markdown)
    =========================================================
    Produce the document with EXACTLY these headings:

    # Title (use the deck title)
    ## Why this matters (concise hook)
    ## Student profile (restated, 2–3 lines)
    ## Learning intention
    ## Success criteria
    ## Lesson narrative (explicit learning sequence)
    ## Checks for understanding
    ## Feedback moves (teacher)
    ## Retrieval & transfer
    ## Where AI helps (and why)
    ## Where AI hurts (and why)
    ## Safe AI use patterns (3 templates)
    ## What students produce today (evidence of learning)

    In "Lesson narrative":
    - Provide a minute-by-minute outline up to CONSTRAINTS.duration_minutes.
    - Reference slide IDs for each phase (e.g., “Use s04–s06 here”).
    - In I DO / WE DO / YOU DO, use the Need → Breakthrough → Representation → Impact frame explicitly.

    In "Why this matters":
    - Make a concise, appealing argument that connects the concept’s evolution to real needs
      (based on the deck), using language appropriate to STUDENT_PROFILE.

    =========================================================
    4) Guardrails
    =========================================================
    - Do not invent facts beyond what is in SLIDE_DECK_YAML.
    - If a detail is missing, say “(not specified in slides)”.
    - Keep the narrative student-accessible and motivating.

    Now produce the Markdown document.
    constraints:
    type: "object"
    required: false
    default:
      duration_minutes: 60
      tone: "concise-appealing"
      explicit_learning_elements:
        - "learning_intention"
        - "success_criteria"
        - "activate_prior_knowledge"
        - "I_do_modeling"
        - "we_do_guided_practice"
        - "you_do_independent_practice"
        - "checks_for_understanding"
        - "feedback"
        - "retrieval_and_transfer"
      ai_policy_level: "classroom_safe"
      output_length: "medium"
    description: >
      Optional knobs:
      - duration_minutes (int)
      - tone ("concise-appealing"|"formal"|"playful")
      - explicit_learning_elements (list)
      - ai_policy_level ("classroom_safe"|"strict_no_ai"|"teacher_only_ai"|"student_allowed_ai_with_rules")
      - output_length ("short"|"medium"|"long")


    output_notes:
      expected_output_type: "markdown"
      file_intent: >
        Save the model output as a .md file for sharing or printing as a teacher guide.
  message: | 
    please follow the instructions carefully to produce a structured, student-level-appropriate explicit learning narrative based on the provided slide deck YAML and student profile, with critical guidance on AI use.
    {slide_deck_yaml}
    the student profile is: {student_profile}
    the output has to be in french please. Even the titles in the Markdown should be in french.
  adapter: openai
  settings:
    model: gpt-5.2
inputs:
  slide_deck_yaml: "$episodes_to_slides"
  student_profile: "&student_profile"
