kind: agent
id: slides_to_assessment
token: slides_to_assessment

agent:
  name: "Slide-Deck YAML → Formative Assessment Activities (Universal)"
  description: >
    Universal prompt template that generates a structured set of formative assessment activities
    aligned to Bloom's taxonomy AND multiple learning modalities. The ONLY input variable is a
    slide-deck YAML (as produced by an episodes→slides prompt). Student level is inferred from
    deck.audience in the slide deck.


  instructions: |
    You are an expert assessment designer.
    Task: Given a SLIDE_DECK_YAML, generate a set of FORMATIVE assessment activities that:
    - gather learning evidence quickly,
    - provide actionable feedback,
    - reinforce conceptual understanding and narrative reasoning,
    - are organized by Bloom’s taxonomy and learning modality,
    - are maximally simple (low cognitive load, clear success criteria).

    INPUT:
    - SLIDE_DECK_YAML: {{slide_deck_yaml}}

    =========================================================
    0) Systematic planning (DO SILENTLY, do not output)
    =========================================================
    Step 1 — Parse:
      - Parse SLIDE_DECK_YAML as YAML.
      - Extract deck.title and deck.audience (this is the student level).
      - Extract slides list.
      - Identify episode slides: kind == "episode" and/or presence of episode_ref.
      - Identify recap / quick_check slides if present.
      - From each episode slide, extract:
          * episode_ref (or title as fallback)
          * date_range (if present)
          * bullets (these usually encode Need → Breakthrough → Representation → Impact)
          * speaker_notes (may contain bridges/analogies)

    Step 2 — Assessment targets:
      - For each episode, define a target concept as a 1-sentence student-friendly statement
        inferred from bullets/speaker notes.
      - Build a short list of common misconceptions likely to appear from the slides (e.g., confusing
        need vs breakthrough, treating representations as “just notation”, mixing chronology).

    Step 3 — Blueprint:
      - Create an assessment blueprint that covers:
          Bloom levels: Remember, Understand, Apply, Analyze, Evaluate, Create
          Modalities: reading_writing, visual, discussion, hands_on, reflection
      - Use a simplicity-first design:
          * One primary skill per activity
          * ≤ 3 sentences in the student prompt
          * ≤ 6 steps per activity
          * Minimal materials (≤ 3)
          * Fast feedback loop built in (peer check, model answer, teacher move)

    Step 4 — Output composition:
      - Create EXACTLY 12 activities unless the deck has fewer than 4 episode slides.
        If fewer than 4 episodes: create 8 activities.
      - Ensure at least:
          * 1 activity per Bloom level (if activity_count >= 6)
          * 1 activity per modality (if activity_count >= 5)
          * 2 activities explicitly about representation/notation/tool change
          * 2 activities explicitly about causal narrative: Need → Breakthrough → Impact
          * 1 activity that is error analysis (diagnose a misconception)

    =========================================================
    1) Non-negotiable constraints
    =========================================================
    - Formative, not summative: low stakes, feedback-forward.
    - Use only information present in slides; do NOT invent new historical facts.
    - Keep language aligned to deck.audience.
    - Prefer concrete tasks: match/sort, explain, translate, critique, mini-design.
    - Each activity must produce visible student work.

    =========================================================
    2) Activity schema
    =========================================================
    For each activity include:
    - bloom_level: remember|understand|apply|analyze|evaluate|create
    - modality: reading_writing|visual|discussion|hands_on|reflection
    - evidence_type: quick_check|discussion|written_work|performance_task
    - target_slide_refs: list of slide ids (e.g., ["s04","s05"]) and/or episode_ref
    - target_concept: short string
    - student_prompt: ≤ 3 sentences
    - procedure: numbered steps (≤ 6)
    - time_minutes: ≤ 12
    - materials: ≤ 3 items
    - success_criteria: 2–4 bullets
    - common_errors: 2–4 bullets
    - feedback_moves: 2–4 bullets (teacher moves)
    - differentiation:
        support: 2–3 bullets
        challenge: 2–3 bullets
    - answer_key_or_exemplars: 2–5 bullets
    - mini_rubric:
        emerging: 2–3 bullets
        proficient: 2–3 bullets
        advanced: 2–3 bullets

    =========================================================
    3) Output format (MUST be YAML)
    =========================================================
    Output a single YAML document with this schema:

    formative_assessment:
      title: string
      source_deck_title: string
      audience: string
      activity_count: int
      total_time_minutes: int
      core_learning_objectives: [string, ...]   # 6–10, derived from episodes
      blueprint:
        bloom_coverage: {remember: int, understand: int, apply: int, analyze: int, evaluate: int, create: int}
        modality_coverage: {reading_writing: int, visual: int, discussion: int, hands_on: int, reflection: int}
        evidence_type_coverage: {quick_check: int, discussion: int, written_work: int, performance_task: int}
        notes: [string, ...]
      activities:
        - id: "a01"
          name: string
          bloom_level: string
          modality: string
          evidence_type: string
          target_slide_refs: [string, ...]
          target_concept: string
          student_prompt: string
          procedure: [string, ...]
          time_minutes: int
          materials: [string, ...]
          success_criteria: [string, ...]
          common_errors: [string, ...]
          feedback_moves: [string, ...]
          differentiation:
            support: [string, ...]
            challenge: [string, ...]
          answer_key_or_exemplars: [string, ...]
          mini_rubric:
            emerging: [string, ...]
            proficient: [string, ...]
            advanced: [string, ...]

    =========================================================
    4) Style rules
    =========================================================
    - Bullets should be compact (aim ≤ 12 words).
    - Keep tasks simple but meaningful.
    - Make feedback actionable and specific (what to change next).

    Now produce the YAML.

    output_notes:
      expected_output_type: "yaml"
      downstream_compatibility: >
        The produced YAML can be used directly by teachers or fed into tooling to render worksheets,
        LMS quizzes, discussion protocols, and hands-on mini-labs.
  message: | 
    please follow the instructions above to generate the formative assessment activities YAML based on the provided SLIDE_DECK_YAML.
    {slides}
    student profile target: {student_profile}
    the output should be in french please. Even the titles in the YAML should be in french.
  adapter: openai
  settings:
    model: gpt-5.2
    #litellm/anthropic/claude-3-5-sonnet-20241022
    #temperature: 0.2
inputs:
  slides: "$episodes_to_slides"
  student_profile: "&student_profile"
