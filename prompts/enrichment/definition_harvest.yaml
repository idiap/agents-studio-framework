# definition_harvest.yaml
name: "Definition Harvest for Arguments (DeHa)"
version: "v2"
description: >
  A ready-to-use, systematic prompt to extract formal supporting definitions for an argument.
  Given an argument (premises + claims), identify all concepts requiring definition,
  retrieve/normalize formal, source-cited definitions, and output a minimally sufficient
  supporting glossary with provenance and domain alignment.

goal:
  - "Identify concepts that require definition for an argument to be well-typed and evaluable."
  - "Retrieve or normalize formal, source-cited definitions for those concepts."
  - "Output a coherent, minimally sufficient set of supporting definitions with provenance."

inputs:
  ARGUMENT_TEXT: "<<paste the full argument here (premises + claims + inline terms)>>"
  DOMAIN: "<<optional: oncology, contract law, finance, logic, control theory>>"
  JURISDICTION: "<<optional: EU, US, ISO/IEC, IUPAC, WHO, GAAP/IFRS>>"
  TIMEBOUND: "<<optional: prefer most recent ≥ YYYY>>"
  ONTOLOGY_PREFERENCES: "<<optional: NCIt, MeSH, SNOMED CT, FIBO, schema.org>>"
  DISAMBIGUATION_HINTS: "<<optional: short notes if terms are polysemous>>"

source_priority:
  - "Domain standards & codes: ISO/IEC, NIST, IEEE, IUPAC, IETF/RFCs, W3C, HL7, ICD/LOINC/SNOMED/MeSH/NCIt, FIBO, GAAP/IFRS"
  - "Statutory / regulatory texts & case law"
  - "Scholarly reference works: SEP, textbooks/handbooks, WHO/CDC guidance, FDA/EMA"
  - "Curated ontologies/KBs: OBO Foundry, Wikidata (last resort)"
  - "General dictionaries: OED, Merriam-Webster (only if higher tiers fail)"

strict_rules:
  - "Prefer genus–differentia or necessary/sufficient condition style definitions."
  - "Preserve exact wording for quotations; include citation + identifier/URL if available."
  - "If multiple conflicting formal definitions exist, report all and recommend one aligned with DOMAIN/JURISDICTION."
  - "Never invent definitions. If none found, return UNFOUND and propose precise search queries."
  - "Detect and normalize abbreviations and symbols (AUC, GDP, ⊨, →, β)."
  - "Map to ontology IDs where possible (NCIt, MeSH, SNOMED CT, FIBO IRIs)."
  - "Distinguish definition type: lexical / stipulative / precising / theoretical / operational."

procedure:
  parse_and_segment:
    - "Split ARGUMENT_TEXT into numbered premises P1..Pn and conclusions C1..Cm."
    - "Tokenize noun phrases and symbol-bearing expressions; keep domain formulas."
  concept_inventory:
    - "Build candidate concept list with frequency, role, and dependency."
    - "Flag definition-critical concepts using heuristics: technical terms, legal terms of art, ambiguous polysemes, abstract relational operators, units & thresholds."
  sense_proposals_and_disambiguation:
    - "For each candidate, list likely senses by source; align to DOMAIN/JURISDICTION."
    - "Choose the argument-coherent sense set that minimizes cross-definition contradiction."
  definition_retrieval_and_normalization:
    - "Extract verbatim definitions from sources in priority order."
    - "Normalize to a canonical form (genus–differentia or necessary–sufficient)."
    - "Attach ontology IDs and formal constraints (e.g., necessary conditions)."
  sufficiency_check:
    - "Build dependency graph: which premises/claims require which defined terms."
    - "Add missing bridge concepts until every edge is supported."
  quality_gates:
    Q1_formality: "Source is authoritative; definition is formal/operational."
    Q2_specificity: "Fit to DOMAIN/JURISDICTION; not over-broad."
    Q3_non_circularity: "Term not defined with itself."
    Q4_consistency: "No contradictions across selected definitions; report conflicts."

output_schema:
  argument_digest:
    premises: "array of {id, text}"
    claims: "array of {id, text}"
  domain: "string"
  jurisdiction_or_standard_family: "string"
  concepts:
    - term: "string"
      abbreviations: ["..."]
      role_refs: ["P1","P3","C1"]
      necessity: "required|supporting|optional"
      sense_label: "string"
      definition_verbatim: "string (quoted if exact)"
      definition_normalized: "string (genus–differentia / necessary–sufficient)"
      definition_type: "lexical|stipulative|precising|theoretical|operational"
      source:
        name: "string"
        type: "standard|statute|ontology|handbook|dictionary"
        identifier_or_uri: "string"
        edition_or_year: "YYYY"
        section_clause: "string"
        citation_key: "[1]"
      ontology_mappings: ["NCIt:C####", "MeSH:D####"]
      constraints_formal: "optional DL/FOL paraphrase"
      conflict_flags: ["none"]
      notes: "brief rationale for sense choice"
  coherence_report:
    conflicts:
      - term: "X"
        between: ["srcA","srcB"]
        note: "..."
    coverage:
      required: 0
      covered: 0
      gaps: []
    search_queries_for_gaps: ["query 1", "query 2"]
  human_readable:
    supporting_definitions:
      - term: "string"
        normalized_definition: "string"
        used_in: ["P1","C1"]
        notes: "brief disambiguation rationale"
        citations: ["[1]","[2]"]
        ontology_ids: ["NCIt:C####"]
    minimal_sufficiency_and_coherence_note: "string"
    references:
      - key: "[1]"
        full_citation: "Author/Body, Title, Year, Section/Clause, Identifier/URL"
        type: "standard|statute|ontology|handbook|dictionary"
        jurisdiction_or_standard_family: "string"
        accessed: "YYYY-MM-DD (optional)"

human_readable_markdown_template: |
  # Supporting Definitions for the Argument
  - **Term** — normalized definition (source: Name, Year, §/ID; definition type; ontology IDs)
    Used in: P? → C?
    Notes: brief disambiguation rationale.

failure_modes_and_fallbacks:
  - "If a definition cannot be found in formal sources, label UNFOUND (formal), provide a provisional lexical definition (marked), and list targeted queries to resolve."

formatting_and_citation_guidelines:
  - "Use bracketed citations [1], [2], …; ensure labels appear in concept.source.citation_key and human_readable.references[*].key."
  - "Quote ≤25 words verbatim; otherwise paraphrase with citation."

checklist:
  - "All definition-critical terms covered"
  - "Domain/jurisdiction alignment clear"
  - "No circular definitions"
  - "Conflicts surfaced with recommendations"
  - "Ontology IDs attached where possible"
  - "Minimal set achieving full premise/claim interpretability"

run_template:
  ARGUMENT_TEXT: "<<PASTE HERE>>"
  DOMAIN: "<<OPTIONAL>>"
  JURISDICTION: "<<OPTIONAL>>"
  TIMEBOUND: "<<OPTIONAL>>"
  ONTOLOGY_PREFERENCES: "<<OPTIONAL>>"
