<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Argument Visualization – Pro/Con Tree</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Layout: tree left, legend right */
        #layout {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 90vh;
            margin-top: 20px;
        }

        #treeContainer {
            flex: 3;
            border: 1px solid #ccc;
            overflow: hidden;
        }

        #legend-panel {
            flex: 1;
            padding: 20px;
            background: #f8f8f8;
            border-left: 1px solid #ccc;
            overflow-y: auto;
        }

        #legend-panel h2 {
            margin-top: 0;
        }

        .legend-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .legend-color-box {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            margin-right: 8px;
        }

        /* --------------------------------------- */
        /* NEW — disagreement panel styles          */
        /* --------------------------------------- */
        #disagreement-panel {
            width: 100%;
            margin-top: 25px;
            padding: 20px;
            background: #f8f8f8;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: Arial, sans-serif;
        }

        #disagreement-panel h2 {
            margin-top: 0;
        }

        .disagree-item {
            margin-left: 12px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <h1>Argument Pro/Con Tree Visualization</h1>

    <p>This viewer loads the hierarchical Pro/Con argument tree generated by your reasoner pipeline.</p>

    <button onclick="loadVisualization()">Load Visualization</button>

    <div id="layout">
        <div id="treeContainer"></div>

        <div id="legend-panel">
            <h2>Argument Distribution</h2>
            <div id="legend-content"></div>
        </div>
    </div>

    <!-- ------------------------------------------------------ -->
    <!-- NEW: Disagreement Panel at the bottom of the page      -->
    <!-- ------------------------------------------------------ -->
    <div id="disagreement-panel">
        <h2>Points of Disagreement</h2>
        <div id="disagreement-content">
            <em>No disagreements detected yet.</em>
        </div>
    </div>

    <script>
    async function loadVisualization() {
        console.log("Fetching visualization...");

        const res = await fetch("http://localhost:5000/api/visualization");
        const data = await res.json();

        console.log("Visualization loaded.");

        window.treeData = JSON.parse(data.tree);
        window.tree = window.treeData;

        eval(data.javascript);
        console.log("Renderer JS evaluated.");

        if (typeof renderTree === "function") {
            renderTree(window.treeData);
        } else {
            console.error("❌ renderTree(treeData) not defined in renderer.js");
        }
    }
    </script>

</body>
</html>
