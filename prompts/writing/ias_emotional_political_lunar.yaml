kind: agent
id: ias_emotional_political
token: ias_emotional_political
agent:
  name: "IAS: Emotional-Political Synthesis"
  description: >
    Craft an argument that openly adopts a political stance and uses emotional appeal,
    while preserving a valid P→L→C chain, Walton scheme labels, CQ answers, and IAS traceability.

    style_targets:
      tone: "forceful, value-forward, partisan framing (explicitly disclosed)"
      emotional_tools: ["framing metaphors", "stakes/urgency", "in-group values", "moral contrast", "anaphora"]
      safeguards: "no fabrication, no demeaning language, no unsafe calls; keep claims evidence-linked"
  instructions: |
    goal: Create an emotionally compelling, politically framed argument synthesis using IAS.

    procedure:
      - step: "Declare Stance & Stakes"
        actions:
          - "State prioritized values from ethical JSON and what is at risk (2–3 sentences)."
      - step: "Harmonize Core Terms (brief)"
        actions:
          - "Give one-line definitions for 2–4 essential terms; show Term Map inline."
      - step: "Drive the Chain"
        actions:
          - "Premises (P#): punchy, value-linked; add evidence codes."
          - "Lemmas (L#): name Scheme + 1 CQ answer; keep sentences crisp."
          - "Conclusion: rallying statement grounded in lemmas."
      - step: "Contrast Block ('What the other side ignores')"
        actions:
          - "List 2–3 bullets referencing opposing assumptions/evidence (with file codes)."
      - step: "Call to Action"
        actions:
          - "1–2 lawful, general lines consistent with the conclusion."
      - step: "Attach JSON"
        actions:
          - "Do not output JSON; keep output human-readable for report display."

    output_format:
      human_readable: |
        # We Choose <Value> (Emotional & Framed)

        Core Terms
        - <Term> — <one-line definition> [definitions:<id>]

        Premises
        P1. … [ethical:<id> | factual:<id>]
        P2. … [assumptions:<id>]
        P3. … [definitions:<id>]

        Lemmas
        L1. … — Scheme: <WaltonLabel> (CQ: <answer>) [schemes:<id>]

        Conclusion
        C1. … — Scheme: <WaltonLabel> (CQ: <answer>) [schemes:<id>]

        What the other side ignores
        - … [assumptions:<id> | factual:<id> | constitutional:<id>]

        Call to action
        - …

      machine_readable_json_shape:
        stance: "string"
        values: ["string"]
        premises: ["P1","P2","P3"]
        lemmas:
          - id: "L1"
            scheme: "WaltonLabel"
            cq_answer: "string"
        conclusion: "C1"

    constraints:
      - "Use emotive framing, but keep claims evidence-linked and accurate."
      - "No demeaning language; no incitement; explicit disclosure of stance."
      - "Maintain IAS linkage: Scheme + ≥1 CQ for each inference."
      - "Output must be valid Markdown only (no JSON, YAML, schema keys, or code fences)."
      - "Return only the Human-readable section."

    checklist:
      - "Stance stated; values trace to ethical JSON"
      - "Emotional elements present but claims remain evidence-linked"
      - "Each link has Scheme + CQ answer"
      - "Contrast block cites real opposing assumptions/evidence"
      - "Human-readable structure is complete and consistent"

    run_instructions:
      - "Set ARG_TEXT and supply JSON files."
      - "Follow procedure; output only human-readable Markdown."
  message: |
    Using the provided IAS argument structure and JSON files, create an emotionally compelling and politically framed argument synthesis that maintains logical validity and traceability.
    Return only clean Markdown formatted for direct insertion into a report.

    Argument:
    {argument}
    files:
      definitions_json: {definitions_json}
      assumptions_json: {assumptions_json}
      schemes_json: {schemes_json}
      constitutional_alignment_json: {constitutional_alignment_json}
      ethical_alignment_json: {ethical_alignment_json}

  adapter: openai
  settings:
    model: gpt-5

inputs:
  argument: "&argument"
  definitions_json: "$definition_harvester"
  assumptions_json: "$assumption_harvester"
  schemes_json: "$walton_scheme_harvester"
  constitutional_alignment_json: "$constitutional_alignment_harvester"
  ethical_alignment_json: "$ethical_stance_harvester"
